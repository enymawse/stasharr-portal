<div class="layout" [class.collapsed]="collapsed()">
  <aside class="sidebar">
    <div class="sidebar-head">
      @if (!collapsed()) {
        <p class="brand">Stasharr</p>
      } @else {
        <p class="brand compact">S</p>
      }

      <button
        type="button"
        class="collapse-btn"
        (click)="toggleCollapsed()"
        [attr.aria-label]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
        [attr.aria-expanded]="!collapsed()"
      >
        <i
          [class]="collapsed() ? 'pi pi-angle-double-right' : 'pi pi-angle-double-left'"
          aria-hidden="true"
        ></i>
      </button>
    </div>

    <nav class="nav" aria-label="Primary navigation">
      <a
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-home"></i></span>
        @if (!collapsed()) {
          <span>Home</span>
        }
      </a>

      <a
        routerLink="/scenes"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-video"></i></span>
        @if (!collapsed()) {
          <span>Scenes</span>
        }
      </a>

      <a
        routerLink="/acquisition"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-inbox"></i></span>
        @if (!collapsed()) {
          <span>Acquisition</span>
        }
      </a>

      <a
        routerLink="/library"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-folder-open"></i></span>
        @if (!collapsed()) {
          <span>Library</span>
        }
      </a>

      <a
        routerLink="/performers"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-users"></i></span>
        @if (!collapsed()) {
          <span>Performers</span>
        }
      </a>

      <a
        routerLink="/studios"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-building"></i></span>
        @if (!collapsed()) {
          <span>Studios</span>
        }
      </a>

      <a
        routerLink="/settings"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="icon" aria-hidden="true"><i class="pi pi-cog"></i></span>
        @if (!collapsed()) {
          <span>Settings</span>
        }
      </a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
