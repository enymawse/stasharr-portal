services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - sp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
      - .env
    environment:
      DATABASE_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/v1/status').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  sp_postgres_data:
